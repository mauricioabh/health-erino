name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — typecheck, lint, auth tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: API authorization tests
        run: npm run test:auth

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost/placeholder?sslmode=require"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_must_replace_in_production_00
          CLERK_SECRET_KEY: sk_test_placeholder_must_replace_in_production_00000000
